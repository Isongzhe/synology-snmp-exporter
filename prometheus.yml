global:
  scrape_interval: 5s

scrape_configs:
  - job_name: nas-monitor
    static_configs:
      - targets: ["nas-monitor-api:7003"]
    metrics_path: /prom

  - job_name: host-monitor
    static_configs:
      - targets: ["host.containers.internal:9100"]
  
  - job_name: 'minio-job'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['192.168.250.100:9000'] # 使用你日誌中顯示的 IP
